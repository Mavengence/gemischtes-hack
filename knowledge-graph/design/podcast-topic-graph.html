<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcast Topic Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #fdf8f5;
    --surface:   #ffffff;
    --surface2:  #fef3ec;
    --border:    #f0e4d8;
    --border2:   #e0cfc0;
    --grad: linear-gradient(135deg, #833ab4 0%, #c13584 30%, #f77737 70%, #fcaf45 100%);
    --grad-soft: linear-gradient(135deg, #f8f0ff 0%, #fde8f5 40%, #fff4ea 100%);
    --text-dark:  #1a0a0a;
    --text-mid:   #5a3a3a;
    --text-soft:  #a07860;
    --shadow-sm: 0 1px 4px rgba(100,40,0,0.06);
    --shadow-md: 0 4px 20px rgba(100,40,0,0.10);
    --shadow-lg: 0 12px 48px rgba(100,40,0,0.14);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text-dark); font-family:'Nunito',sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; }

  /* HEADER */
  header { padding:0 28px; height:58px; display:flex; align-items:center; justify-content:space-between; background:var(--surface); border-bottom:1px solid var(--border); box-shadow:var(--shadow-sm); position:relative; z-index:100; flex-shrink:0; }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon { width:30px; height:30px; border-radius:8px; background:var(--grad); display:flex; align-items:center; justify-content:center; font-size:14px; box-shadow:0 2px 8px rgba(193,53,132,.35); flex-shrink:0; }
  .logo-text { font-family:'Lora',serif; font-size:1.05rem; font-weight:600; }
  .logo-text span { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .view-btns { display:flex; gap:6px; }
  .view-btn { background:none; border:1.5px solid var(--border2); color:var(--text-soft); font-family:'Nunito',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:6px 18px; cursor:pointer; border-radius:20px; transition:all .2s; }
  .view-btn:hover { border-color:#c13584; color:#c13584; background:#fce7f3; }
  .view-btn.active { background:var(--grad); border-color:transparent; color:white; box-shadow:0 2px 10px rgba(193,53,132,.35); }
  .header-right { display:flex; gap:20px; align-items:center; }
  .meta-pill { font-size:0.72rem; font-weight:600; color:var(--text-soft); white-space:nowrap; }
  .meta-pill strong { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-weight:800; }

  /* LAYOUT */
  .main-layout { display:flex; flex:1; overflow:hidden; }

  /* SIDEBAR */
  .sidebar { width:272px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .sidebar-top { padding:14px 16px 12px; border-bottom:1px solid var(--border); }
  .sec-label { font-size:0.6rem; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--text-soft); margin-bottom:9px; }
  .cat-row { display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:9px; cursor:pointer; transition:background .15s; margin-bottom:2px; }
  .cat-row:hover { background:var(--surface2); }
  .cat-row.active { background:var(--grad-soft); }
  .cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .cat-name { font-size:0.78rem; font-weight:600; color:var(--text-mid); flex:1; }
  .cat-count { font-size:0.66rem; font-weight:700; color:var(--text-soft); background:var(--border); padding:1px 7px; border-radius:10px; }
  .ep-label { padding:14px 16px 6px; font-size:0.6rem; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--text-soft); border-top:1px solid var(--border); }
  .ep-list { flex:1; overflow-y:auto; padding:4px 10px 12px; }
  .ep-list::-webkit-scrollbar { width:4px; }
  .ep-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
  .ep-item { padding:9px 10px; border-radius:10px; cursor:pointer; border:1.5px solid transparent; margin-bottom:3px; transition:all .18s; }
  .ep-item:hover { background:var(--surface2); border-color:var(--border2); }
  .ep-item.selected { background:var(--grad-soft); border-color:#c13584; }
  .ep-num { font-size:0.6rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; margin-bottom:2px; }
  /* KEY: large, serif, dark title */
  .ep-title { font-family:'Lora',serif; font-size:0.84rem; font-weight:500; color:var(--text-dark); line-height:1.35; margin-bottom:5px; }
  .ep-chips { display:flex; gap:4px; flex-wrap:wrap; }
  .ep-chip { font-size:0.6rem; font-weight:700; padding:2px 7px; border-radius:6px; }

  /* CANVAS */
  .canvas-area { flex:1; position:relative; overflow:hidden; background:var(--bg); background-image:radial-gradient(circle at 15% 15%,rgba(131,58,180,.06) 0%,transparent 50%),radial-gradient(circle at 85% 80%,rgba(247,119,55,.06) 0%,transparent 50%); }
  canvas { display:block; cursor:grab; }
  canvas:active { cursor:grabbing; }

  /* TOOLTIP */
  #tooltip { position:absolute; background:white; border:1px solid var(--border2); border-radius:12px; padding:14px 16px; pointer-events:none; opacity:0; transition:opacity .18s; z-index:200; max-width:240px; box-shadow:var(--shadow-lg); }
  #tooltip.visible { opacity:1; }
  .tt-ep { font-size:0.62rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
  .tt-title { font-family:'Lora',serif; font-size:1rem; font-weight:600; color:var(--text-dark); line-height:1.3; margin-bottom:5px; }
  .tt-cat { font-size:0.68rem; font-weight:600; color:var(--text-soft); margin-bottom:8px; }
  .tt-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .tt-tag { font-size:0.62rem; font-weight:700; padding:2px 8px; border-radius:6px; }

  /* DETAIL PANEL */
  .detail-panel { position:absolute; right:0; top:0; bottom:0; width:310px; background:white; border-left:1px solid var(--border); transform:translateX(100%); transition:transform .32s cubic-bezier(.4,0,.2,1); z-index:150; overflow-y:auto; box-shadow:var(--shadow-lg); }
  .detail-panel.open { transform:translateX(0); }
  .detail-panel::-webkit-scrollbar { width:4px; }
  .detail-panel::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
  .d-hero { padding:24px 24px 20px; background:var(--grad-soft); border-bottom:1px solid var(--border); position:relative; }
  .d-close { position:absolute; top:14px; right:14px; background:white; border:1px solid var(--border2); color:var(--text-soft); font-size:12px; width:28px; height:28px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; box-shadow:var(--shadow-sm); }
  .d-close:hover { border-color:#e1306c; color:#e1306c; }
  .d-badge { font-size:0.62rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; display:block; }
  .d-title { font-family:'Lora',serif; font-size:1.25rem; font-weight:600; line-height:1.3; color:var(--text-dark); padding-right:36px; }
  .d-body { padding:18px 22px; }
  .d-sec { font-size:0.6rem; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--text-soft); margin:18px 0 10px; }
  .d-sec:first-child { margin-top:0; }
  .tbar { margin-bottom:10px; }
  .tbar-row { display:flex; justify-content:space-between; margin-bottom:3px; }
  .tbar-name { font-size:0.75rem; font-weight:600; color:var(--text-mid); }
  .tbar-pct { font-size:0.65rem; font-weight:700; color:var(--text-soft); }
  .tbar-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .tbar-fill { height:100%; border-radius:3px; transition:width .6s cubic-bezier(.4,0,.2,1); }
  .d-chips { display:flex; flex-wrap:wrap; gap:5px; }
  .d-chip { font-size:0.68rem; font-weight:600; padding:4px 11px; border-radius:8px; cursor:pointer; transition:all .15s; }
  .d-chip:hover { background:var(--grad) !important; color:white !important; }

  /* FLOATING */
  .stats-bar { position:absolute; top:16px; left:16px; display:flex; gap:8px; z-index:10; }
  .stat-card { background:white; border:1px solid var(--border); border-radius:10px; padding:8px 14px; box-shadow:var(--shadow-sm); text-align:center; }
  .stat-val { font-family:'Lora',serif; font-size:1.1rem; font-weight:600; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; display:block; line-height:1; margin-bottom:2px; }
  .stat-lbl { font-size:0.58rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--text-soft); }
  .legend { position:absolute; bottom:20px; left:16px; background:white; border:1px solid var(--border); border-radius:12px; padding:14px 16px; box-shadow:var(--shadow-md); z-index:10; }
  .leg-title { font-size:0.6rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--text-soft); margin-bottom:8px; }
  .leg-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:0.7rem; font-weight:600; }
  .leg-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .zoom-controls { position:absolute; bottom:20px; right:20px; display:flex; flex-direction:column; gap:5px; z-index:10; }
  .zoom-btn { width:34px; height:34px; background:white; border:1.5px solid var(--border2); color:var(--text-mid); font-size:1.1rem; cursor:pointer; border-radius:8px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-sm); transition:all .15s; font-family:'Nunito',sans-serif; font-weight:700; }
  .zoom-btn:hover { border-color:#c13584; color:#c13584; background:#fce7f3; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎙</div>
    <div class="logo-text">Podcast <span>Universe</span></div>
  </div>
  <div class="view-btns">
    <button class="view-btn active" onclick="setView('bubble')" id="btn-bubble">Bubble</button>
    <button class="view-btn" onclick="setView('timeline')" id="btn-timeline">Timeline</button>
    <button class="view-btn" onclick="setView('cluster')" id="btn-cluster">Cluster</button>
  </div>
  <div class="header-right">
    <div class="meta-pill"><strong>48</strong> Episodes</div>
    <div class="meta-pill"><strong>120</strong> Super Topics</div>
    <div class="meta-pill">Avg <strong>6.2</strong> topics / ep</div>
  </div>
</header>

<div class="main-layout">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="sec-label">Category Filter</div>
      <div id="cat-filters"></div>
    </div>
    <div class="ep-label">Episodes</div>
    <div class="ep-list" id="ep-list"></div>
  </div>

  <div class="canvas-area">
    <canvas id="c"></canvas>
    <div class="stats-bar">
      <div class="stat-card"><span class="stat-val" id="stat-vis">48</span><div class="stat-lbl">Visible</div></div>
      <div class="stat-card"><span class="stat-val" id="stat-sel">—</span><div class="stat-lbl">Selected</div></div>
    </div>
    <div id="tooltip">
      <div class="tt-ep" id="tt-num"></div>
      <div class="tt-title" id="tt-title"></div>
      <div class="tt-cat" id="tt-cat"></div>
      <div class="tt-tags" id="tt-tags"></div>
    </div>
    <div class="legend">
      <div class="leg-title">Categories</div>
      <div id="leg-cats"></div>
      <div class="leg-title" style="margin-top:10px">Node Size</div>
      <div class="leg-row"><div class="leg-dot" style="background:#ddd;width:6px;height:6px"></div><span style="color:var(--text-soft)">Few topics</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#c13584;width:14px;height:14px"></div><span style="color:var(--text-soft)">Many topics</span></div>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomBy(1.2)">+</button>
      <button class="zoom-btn" onclick="zoomBy(0.83)">−</button>
      <button class="zoom-btn" onclick="resetView()" style="font-size:.7rem">↺</button>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="d-hero">
        <button class="d-close" onclick="closeDetail()">✕</button>
        <span class="d-badge" id="d-badge"></span>
        <div class="d-title" id="d-title"></div>
      </div>
      <div class="d-body">
        <div class="d-sec">Top Topics by Weight</div>
        <div id="d-bars"></div>
        <div class="d-sec">All Topics</div>
        <div class="d-chips" id="d-chips"></div>
      </div>
    </div>
  </div>
</div>

<script>
const CATS = [
  {name:'Technology',color:'#833ab4',bg:'#f3e8ff',topics:['AI','Machine Learning','LLMs','APIs','Cloud','Open Source','Dev Tools','Databases','Edge Computing','WebAssembly','Containers','CI/CD']},
  {name:'Business',  color:'#f77737',bg:'#fff3e8',topics:['Startups','Venture Capital','Product Strategy','GTM','Revenue','Pricing','Competition','Leadership','Culture','Hiring','Metrics','SaaS']},
  {name:'Science',   color:'#d4900a',bg:'#fffae8',topics:['Biology','Physics','Climate','Neuroscience','Genetics','Space','Chemistry','Mathematics','Psychology','Ecology']},
  {name:'Society',   color:'#fd1d1d',bg:'#fff0f0',topics:['Politics','Education','Healthcare','Media','Cities','Demographics','Inequality','Policy','History','Philosophy']},
  {name:'Creativity',color:'#c13584',bg:'#fce7f3',topics:['Design','Writing','Music','Film','Games','Architecture','Fashion','Art','Storytelling','Content']},
  {name:'Future',    color:'#285AEB',bg:'#e8f0ff',topics:['AGI','Transhumanism','Energy','Biotech','Robotics','Quantum','Longevity','Crypto','Governance','Ethics']},
];
const TOPICS = CATS.flatMap(c=>c.topics.map(t=>({name:t,cat:c.name,color:c.color,bg:c.bg})));
['Remote Work','Mental Health','Productivity','Investing','Sustainability','Security','Privacy','Regulation','Infrastructure','Community','Supply Chain','Globalization','Automation','Data','Networks','Platforms','Identity','Trust','Markets','Talent','Diversity','Risk','Resilience','Transparency'].forEach((e,i)=>{
  const c=CATS[i%CATS.length]; TOPICS.push({name:e,cat:c.name,color:c.color,bg:c.bg});
});
const TITLES=['The Intelligence Explosion','Building for Billions','Why Cities Fail','The Gene Editing Dilemma','Rethinking Capitalism','The Attention Economy','What Robots Cannot Do','Space is Open for Business','The Democracy Deficit','Designing for Inclusion','The Future of Work','Science Under Pressure','Rewiring Education','The Founder\'s Dilemma','How We Decide','The Creative Machine','Governing the Internet','Living Longer, Living Better','The Climate Reckoning','Trust in the Age of AI','Making Music with Machines','Startup Myths Debunked','Understanding the Brain','The Open Source Revolution','Breaking Into Healthcare','What Data Really Tells Us','The Storytelling Algorithm','Energy Transitions','Communities That Last','Rethinking Risk','The Ethics of Enhancement','Markets and Meaning','Building Great Teams','The Architecture of Ideas','Privacy is Political','Quantum Horizons','The New Geography of Talent','Science Meets Policy','Designing Cities for People','The Platform Economy','Beyond Disruption','Art in the Digital Age','The Biology of Behavior','Distributed Trust','From Data to Wisdom','The Global Supply Chain','Radical Transparency','Networks of Power'];

function pickT(n){const p=[...TOPICS],o=[];for(let i=0;i<n;i++){const x=Math.floor(Math.random()*p.length);o.push(p.splice(x,1)[0]);}return o;}

const EPS=TITLES.map((title,i)=>{
  const tc=3+Math.floor(Math.random()*10),topics=pickT(tc);
  const freq=topics.reduce((a,t)=>{a[t.cat]=(a[t.cat]||0)+1;return a;},{});
  const primary=Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0];
  const c=CATS.find(c=>c.name===primary);
  return{id:i,num:i+1,title,topics,tc,color:c.color,bg:c.bg,cat:primary};
});

const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,dpr,view='bubble',nodes=[],T={x:0,y:0,s:1},drag={on:false},hov=null,sel=null,filterCat=null;

function hexA(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function resize(){
  const el=canvas.parentElement;dpr=window.devicePixelRatio||1;
  W=el.clientWidth;H=el.clientHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);build();
}

function build(){
  if(view==='bubble')bBubble();
  else if(view==='timeline')bTimeline();
  else bCluster();
}

function bBubble(){
  nodes=EPS.map((ep,i)=>{
    const a=(i/EPS.length)*Math.PI*2-Math.PI/2,r=Math.min(W,H)*.36*(0.55+Math.random()*.45);
    return{ep,tx:W/2+Math.cos(a)*r+(Math.random()-.5)*70,ty:H/2+Math.sin(a)*r+(Math.random()-.5)*60,x:W/2,y:H/2,r:9+ep.tc*2,al:0,tal:1};
  });T={x:0,y:0,s:1};
}
function bTimeline(){
  const pad=90,tot=W-pad*2;
  nodes=EPS.map((ep,i)=>({ep,tx:pad+(i/(EPS.length-1))*tot,ty:H/2+Math.sin(i*.45)*(H*.22)+(Math.random()-.5)*25,x:pad+(i/(EPS.length-1))*tot,y:H/2,r:8+ep.tc*1.8,al:0,tal:1}));
  T={x:0,y:0,s:1};
}
function bCluster(){
  const ctr={};CATS.forEach((c,i)=>{const a=(i/CATS.length)*Math.PI*2,r=Math.min(W,H)*.28;ctr[c.name]={x:W/2+Math.cos(a)*r,y:H/2+Math.sin(a)*r};});
  nodes=EPS.map(ep=>{const c=ctr[ep.cat];return{ep,tx:c.x+(Math.random()-.5)*110,ty:c.y+(Math.random()-.5)*90,x:W/2,y:H/2,r:8+ep.tc*1.9,al:0,tal:1};});
  T={x:0,y:0,s:1};
}

function s2w(sx,sy){return{x:(sx-T.x)/T.s,y:(sy-T.y)/T.s};}

function drawLoop(){
  ctx.clearRect(0,0,W,H);
  nodes.forEach(n=>{n.x+=(n.tx-n.x)*.09;n.y+=(n.ty-n.y)*.09;n.al+=(n.tal-n.al)*.07;});
  ctx.save();ctx.translate(T.x,T.y);ctx.scale(T.s,T.s);

  // connections
  if(sel){nodes.forEach(n=>{if(n===sel)return;const sh=sel.ep.topics.filter(t=>n.ep.topics.find(tt=>tt.name===t.name)).length;if(!sh)return;ctx.beginPath();ctx.moveTo(sel.x,sel.y);ctx.lineTo(n.x,n.y);ctx.strokeStyle=hexA(sel.ep.color,Math.min(.4,sh*.13));ctx.lineWidth=Math.min(2.5,sh*.5);ctx.stroke();});}

  // timeline axis
  if(view==='timeline'){ctx.beginPath();ctx.moveTo(80,H*.88);ctx.lineTo(W-80,H*.88);ctx.strokeStyle='#e0cfc0';ctx.lineWidth=1;ctx.stroke();nodes.forEach((n,i)=>{if(i%8===0){ctx.beginPath();ctx.moveTo(n.x,H*.88-4);ctx.lineTo(n.x,H*.88+4);ctx.strokeStyle='#c4a898';ctx.lineWidth=1;ctx.stroke();ctx.font='9px Nunito,sans-serif';ctx.fillStyle='#a07860';ctx.textAlign='center';ctx.fillText('EP'+(i+1),n.x,H*.88+16);}});}

  // cluster labels
  if(view==='cluster'){CATS.forEach((c,i)=>{const a=(i/CATS.length)*Math.PI*2,r=Math.min(W,H)*.28;const cx=W/2+Math.cos(a)*r,cy=H/2+Math.sin(a)*r;ctx.font='bold 10px Nunito,sans-serif';ctx.fillStyle=hexA(c.color,.55);ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(c.name.toUpperCase(),cx,cy-58);});}

  nodes.forEach(n=>{
    const filt=filterCat&&n.ep.cat!==filterCat,a=filt?.08:n.al;
    const hot=hov===n||sel===n,r=hot?n.r*1.22:n.r;
    if(!filt&&hot){const grd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*2.5);grd.addColorStop(0,hexA(n.ep.color,.12*a));grd.addColorStop(1,hexA(n.ep.color,0));ctx.beginPath();ctx.arc(n.x,n.y,r*2.5,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();}
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=hexA(n.ep.color,.13*a);ctx.fill();
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.strokeStyle=hexA(n.ep.color,(hot?.9:.55)*a);ctx.lineWidth=hot?2.5:1.5;ctx.stroke();
    ctx.beginPath();ctx.arc(n.x,n.y,3,0,Math.PI*2);ctx.fillStyle=hexA(n.ep.color,a*.9);ctx.fill();

    // ── LABELS ──
    if(!filt&&a>.3){
      const showFull=hot||r>20;
      if(showFull){
        // ep number above
        ctx.textAlign='center';ctx.textBaseline='alphabetic';
        ctx.font=`700 9px Nunito,sans-serif`;ctx.fillStyle=hexA(n.ep.color,a*.9);
        ctx.fillText(`EP ${n.ep.num}`,n.x,n.y-r-5);
        // episode title below — serif, dark, two lines
        ctx.font=`500 11px Lora,serif`;ctx.fillStyle=hexA('#1a0a0a',a*.82);ctx.textBaseline='top';
        const words=n.ep.title.split(' '),mid=Math.ceil(words.length/2);
        const l1=words.slice(0,mid).join(' '),l2=words.slice(mid).join(' ');
        ctx.fillText(l1,n.x,n.y+r+5);
        if(l2)ctx.fillText(l2,n.x,n.y+r+19);
      } else if(r>13){
        ctx.font=`700 ${Math.min(10,r*.48)}px Nunito,sans-serif`;ctx.fillStyle=hexA(n.ep.color,a*.85);ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(`#${n.ep.num}`,n.x,n.y);
      }
    }
  });
  ctx.restore();
  requestAnimationFrame(drawLoop);
}

// interactions
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  if(drag.on){T.x=drag.tx+(mx-drag.sx);T.y=drag.ty+(my-drag.sy);return;}
  const w=s2w(mx,my);let hit=null;nodes.forEach(n=>{const dx=n.x-w.x,dy=n.y-w.y;if(Math.sqrt(dx*dx+dy*dy)<n.r+6)hit=n;});
  hov=hit;const tt=document.getElementById('tooltip');
  if(hit){canvas.style.cursor='pointer';document.getElementById('tt-num').textContent=`Episode ${hit.ep.num}`;document.getElementById('tt-num').style.color=hit.ep.color;document.getElementById('tt-title').textContent=hit.ep.title;document.getElementById('tt-cat').textContent=`${hit.ep.tc} topics · ${hit.ep.cat}`;document.getElementById('tt-tags').innerHTML=hit.ep.topics.slice(0,5).map(t=>`<span class="tt-tag" style="background:${t.bg};color:${t.color}">${t.name}</span>`).join('');let tx=e.clientX+14,ty=e.clientY-20;if(tx+260>window.innerWidth)tx=e.clientX-260;tt.style.left=tx+'px';tt.style.top=ty+'px';tt.classList.add('visible');}
  else{canvas.style.cursor='grab';tt.classList.remove('visible');}
});
canvas.addEventListener('mousedown',e=>{drag={on:true,sx:e.clientX,sy:e.clientY,tx:T.x,ty:T.y};});
canvas.addEventListener('mouseup',e=>{const mv=Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy);drag.on=false;if(mv<5&&hov)openDetail(hov);});
canvas.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.1:.9,rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;T.x=mx-(mx-T.x)*f;T.y=my-(my-T.y)*f;T.s*=f;},{passive:false});
function zoomBy(f){T.x=W/2-(W/2-T.x)*f;T.y=H/2-(H/2-T.y)*f;T.s*=f;}
function resetView(){T={x:0,y:0,s:1};}

function openDetail(n){
  sel=n;const ep=n.ep;
  document.getElementById('d-badge').textContent=`Episode ${ep.num} · ${ep.cat}`;
  document.getElementById('d-title').textContent=ep.title;
  document.getElementById('d-bars').innerHTML=ep.topics.slice(0,5).map((t,i)=>{const p=95-i*14;return`<div class="tbar"><div class="tbar-row"><span class="tbar-name">${t.name}</span><span class="tbar-pct">${p}%</span></div><div class="tbar-track"><div class="tbar-fill" style="width:${p}%;background:${t.color}"></div></div></div>`;}).join('');
  document.getElementById('d-chips').innerHTML=ep.topics.map(t=>`<div class="d-chip" style="background:${t.bg};color:${t.color}">${t.name}</div>`).join('');
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('stat-sel').textContent=`#${ep.num}`;
  document.querySelectorAll('.ep-item').forEach(e=>e.classList.remove('selected'));
  const el=document.getElementById('ep-'+ep.id);if(el){el.classList.add('selected');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function closeDetail(){sel=null;document.getElementById('detail-panel').classList.remove('open');document.getElementById('stat-sel').textContent='—';}

function setView(v){
  view=v;['bubble','timeline','cluster'].forEach(n=>document.getElementById('btn-'+n).classList.toggle('active',n===v));
  nodes.forEach(n=>{n.al=0;n.tal=1;});build();closeDetail();
}

// build sidebar
(function(){
  const cf=document.getElementById('cat-filters');
  const all=document.createElement('div');all.className='cat-row active';all.id='cf-all';
  all.innerHTML=`<div class="cat-dot" style="background:#ccc"></div><span class="cat-name">All</span><span class="cat-count">${EPS.length}</span>`;
  all.onclick=()=>{filterCat=null;document.querySelectorAll('.cat-row').forEach(e=>e.classList.remove('active'));all.classList.add('active');};
  cf.appendChild(all);
  CATS.forEach(c=>{
    const cnt=EPS.filter(e=>e.cat===c.name).length,row=document.createElement('div');row.className='cat-row';
    row.innerHTML=`<div class="cat-dot" style="background:${c.color}"></div><span class="cat-name">${c.name}</span><span class="cat-count">${cnt}</span>`;
    row.onclick=()=>{filterCat=filterCat===c.name?null:c.name;document.querySelectorAll('.cat-row').forEach(e=>e.classList.remove('active'));if(filterCat)row.classList.add('active');else all.classList.add('active');};
    cf.appendChild(row);
    document.getElementById('leg-cats').innerHTML+=`<div class="leg-row"><div class="leg-dot" style="background:${c.color}"></div><span style="color:${c.color}">${c.name}</span></div>`;
  });
  const ll=document.getElementById('ep-list');
  EPS.forEach(ep=>{
    const it=document.createElement('div');it.className='ep-item';it.id='ep-'+ep.id;
    it.innerHTML=`<div class="ep-num" style="color:${ep.color}">EP ${String(ep.num).padStart(3,'0')}</div><div class="ep-title">${ep.title}</div><div class="ep-chips">${ep.topics.slice(0,3).map(t=>`<span class="ep-chip" style="background:${t.bg};color:${t.color}">${t.name}</span>`).join('')}</div>`;
    it.onclick=()=>{const n=nodes.find(nd=>nd.ep.id===ep.id);if(n){openDetail(n);T.x=W/2-n.x*T.s;T.y=H/2-n.y*T.s;}};
    ll.appendChild(it);
  });
})();

window.addEventListener('resize',resize);
resize();
drawLoop();
setTimeout(()=>{nodes.forEach((n,i)=>setTimeout(()=>{n.tal=1;},i*14));},80);
</script>
</body>
</html>
